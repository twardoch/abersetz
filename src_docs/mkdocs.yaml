# this_file: src_docs/mkdocs.yaml
# MkDocs Material configuration for abersetz documentation.
# Build: mkdocs build --config-file src_docs/mkdocs.yaml
# Serve: mkdocs serve --config-file src_docs/mkdocs.yaml
# Output lands in src_docs/site/ (not committed; see .gitignore).
# Copy to docs/ for GitHub Pages: mkdocs build --config-file src_docs/mkdocs.yaml --site-dir ../docs

site_name: abersetz
site_description: "Translate entire directory trees using multiple AI and classic translation engines."
site_url: "https://twardoch.github.io/abersetz/"
repo_url: "https://github.com/twardoch/abersetz"
repo_name: "twardoch/abersetz"
edit_uri: "edit/main/src_docs/md/"

docs_dir: md
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["../../src"]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Choosing an Engine: engines.md
  - CLI Reference: cli.md
  - Configuration: configuration.md
  - Python API: api.md
  - Style Guide: STYLE_GUIDE.md
